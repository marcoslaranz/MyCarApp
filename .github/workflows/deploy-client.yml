name: Deploy Blazor Client to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Blazor Client
        run: dotnet publish src/MyCarApp.Client/MyCarApp.Client.csproj -c Release -o publish

      - name: Fix base path and 404 for GitHub Pages
        run: |
          sed -i 's|<base href="/" />|<base href="/MyCarApp/" />|g' publish/wwwroot/index.html
          cat > publish/wwwroot/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
          <script>
            var pathSegmentsToKeep = 1;
            var l = window.location;
            l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') + (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') + l.hash);
          </script>
          </head>
          <body></body>
          </html>
          EOF
          sed -i 's|<script type="importmap">|<script>var l=window.location;if(l.search[1]==="/"){ var decoded=l.search.slice(1).split("\&").join("\&");window.history.replaceState(null,null,l.pathname.slice(0,l.pathname.lastIndexOf("/")+1)+decoded+l.hash); }</script><script type="importmap">|' publish/wwwroot/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish/wwwroot