<script>
    // GitHub Pages SPA redirect fix
    (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
            history.replaceState(null, null, redirect);
        }
    })();

    window.downloadCsv = function(filename, content) {
        var blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
    };

    window.downloadXlsx = function(filename, jsonData, headers) {
        var ws = XLSX.utils.json_to_sheet(jsonData, { header: headers });
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Log Entries');
        XLSX.writeFile(wb, filename);
    };
</script>
