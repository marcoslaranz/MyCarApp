version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: mycarapp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mycarapp_user
      POSTGRES_PASSWORD: mycarapp_pass
      POSTGRES_DB: mycarapp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
